<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none" role="img" aria-label="The learning loop: watch, quiz, restart on wrong, master">
  <rect width="800" height="420" rx="16" fill="#f6f8fa"/>
  <text x="400" y="36" text-anchor="middle" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="18" font-weight="600">The learning loop</text>
  <text x="400" y="58" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">Test yourself. Miss? Start over. Repeat until it sticks.</text>

  <!-- circular path -->
  <circle cx="400" cy="230" r="130" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="6 6"/>
  <path d="M400 100 A130 130 0 0 1 530 230" stroke="#3d9a8f" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M530 230 A130 130 0 0 1 400 360" stroke="#3d9a8f" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M400 360 A130 130 0 0 1 270 230" stroke="#3d9a8f" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M270 230 A130 130 0 0 1 400 100" stroke="#3d9a8f" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#3d9a8f"/>
    </marker>
  </defs>

  <!-- Watch -->
  <g transform="translate(340, 78)">
    <rect x="0" y="0" width="120" height="44" rx="10" fill="#fff" stroke="#1a1f26" stroke-width="1.7"/>
    <polygon points="18,22 28,16 28,28" fill="#3d9a8f"/>
    <rect x="34" y="14" width="70" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="34" y="26" width="48" height="4" rx="2" fill="#e5e7eb"/>
    <text x="60" y="62" text-anchor="middle" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Watch</text>
  </g>

  <!-- Quiz -->
  <g transform="translate(548, 208)">
    <rect x="0" y="0" width="120" height="44" rx="10" fill="#fff" stroke="#1a1f26" stroke-width="1.7"/>
    <circle cx="22" cy="22" r="10" stroke="#3d9a8f" stroke-width="1.7"/>
    <path d="M18 22 L21 25 L27 18" stroke="#3d9a8f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="38" y="14" width="68" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="38" y="26" width="52" height="4" rx="2" fill="#e5e7eb"/>
    <text x="60" y="62" text-anchor="middle" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Quiz</text>
  </g>

  <!-- Restart -->
  <g transform="translate(340, 338)">
    <rect x="0" y="0" width="120" height="44" rx="10" fill="#fff" stroke="#dc2626" stroke-width="1.7"/>
    <path d="M22 28 C22 18 30 14 36 14 C42 14 46 18 46 22" stroke="#dc2626" stroke-width="1.7" stroke-linecap="round"/>
    <path d="M46 14 L46 22 L38 22" stroke="#dc2626" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="54" y="14" width="54" height="6" rx="3" fill="#fee2e2"/>
    <rect x="54" y="26" width="40" height="4" rx="2" fill="#fee2e2"/>
    <text x="60" y="62" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Restart</text>
  </g>

  <!-- Master -->
  <g transform="translate(132, 208)">
    <rect x="0" y="0" width="120" height="44" rx="10" fill="#fff" stroke="#16a34a" stroke-width="1.7"/>
    <path d="M16 24 L22 30 L34 18" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="42" y="14" width="62" height="6" rx="3" fill="#dcfce7"/>
    <rect x="42" y="26" width="46" height="4" rx="2" fill="#dcfce7"/>
    <text x="60" y="62" text-anchor="middle" fill="#16a34a" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Master</text>
  </g>

  <!-- center label -->
  <circle cx="400" cy="230" r="52" fill="#fff" stroke="#3d9a8f" stroke-width="2"/>
  <text x="400" y="224" text-anchor="middle" fill="#3d9a8f" font-family="system-ui, sans-serif" font-size="11" font-weight="700">REPEAT</text>
  <text x="400" y="242" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">until correct</text>
</svg>
