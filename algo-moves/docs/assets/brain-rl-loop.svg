<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none" role="img" aria-label="Human learning and AI training share the same feedback loop">
  <rect width="800" height="360" rx="16" fill="#f6f8fa"/>
  <text x="400" y="36" text-anchor="middle" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Same loop  human brain, AI training</text>
  <text x="400" y="58" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">Try, get feedback, adjust, repeat.</text>

  <!-- left panel: human -->
  <rect x="40" y="80" width="320" height="250" rx="14" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="200" y="108" text-anchor="middle" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="14" font-weight="600">You</text>

  <!-- brain outline -->
  <path d="M200 130 C170 130 155 150 155 172 C155 192 168 208 185 214 C180 226 188 238 200 242 C212 238 220 226 215 214 C232 208 245 192 245 172 C245 150 230 130 200 130 Z" stroke="#1a1f26" stroke-width="1.7" fill="#f0fdfa"/>
  <path d="M185 160 C192 155 208 155 215 160" stroke="#3d9a8f" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M188 178 C196 174 204 174 212 178" stroke="#3d9a8f" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M192 196 C198 194 202 194 208 196" stroke="#3d9a8f" stroke-width="1.5" stroke-linecap="round"/>

  <!-- quiz card -->
  <rect x="130" y="258" width="140" height="52" rx="8" fill="#fff" stroke="#1a1f26" stroke-width="1.5"/>
  <text x="200" y="280" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">Quiz answer</text>
  <circle cx="155" cy="296" r="8" stroke="#dc2626" stroke-width="1.5"/>
  <path d="M151 296 L154 299 L160 292" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <text x="200" y="302" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Wrong ’ redo all</text>

  <!-- loop arrow human -->
  <path d="M120 220 C100 220 90 240 100 260" stroke="#3d9a8f" stroke-width="2" stroke-linecap="round" marker-end="url(#arr)"/>
  <path d="M280 260 C290 240 280 220 260 220" stroke="#3d9a8f" stroke-width="2" stroke-linecap="round" marker-end="url(#arr)"/>

  <!-- center bridge -->
  <rect x="360" y="155" width="80" height="100" rx="12" fill="#3d9a8f"/>
  <text x="400" y="198" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Same</text>
  <text x="400" y="216" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">loop</text>
  <path d="M360 205 L340 205" stroke="#3d9a8f" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M440 205 L460 205" stroke="#3d9a8f" stroke-width="2" marker-end="url(#arr)"/>

  <!-- right panel: AI -->
  <rect x="440" y="80" width="320" height="250" rx="14" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="600" y="108" text-anchor="middle" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="14" font-weight="600">AI (RL)</text>

  <!-- neural net -->
  <circle cx="520" cy="160" r="10" fill="#3d9a8f" opacity="0.2" stroke="#3d9a8f" stroke-width="1.5"/>
  <circle cx="520" cy="200" r="10" fill="#3d9a8f" opacity="0.2" stroke="#3d9a8f" stroke-width="1.5"/>
  <circle cx="520" cy="240" r="10" fill="#3d9a8f" opacity="0.2" stroke="#3d9a8f" stroke-width="1.5"/>
  <circle cx="600" cy="140" r="10" fill="#3d9a8f" opacity="0.35" stroke="#3d9a8f" stroke-width="1.5"/>
  <circle cx="600" cy="180" r="10" fill="#3d9a8f" opacity="0.35" stroke="#3d9a8f" stroke-width="1.5"/>
  <circle cx="600" cy="220" r="10" fill="#3d9a8f" opacity="0.35" stroke="#3d9a8f" stroke-width="1.5"/>
  <circle cx="600" cy="260" r="10" fill="#3d9a8f" opacity="0.35" stroke="#3d9a8f" stroke-width="1.5"/>
  <circle cx="680" cy="200" r="10" fill="#3d9a8f" opacity="0.5" stroke="#3d9a8f" stroke-width="1.5"/>
  <line x1="530" y1="160" x2="590" y2="140" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="530" y1="160" x2="590" y2="180" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="530" y1="200" x2="590" y2="180" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="530" y1="200" x2="590" y2="220" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="530" y1="240" x2="590" y2="220" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="530" y1="240" x2="590" y2="260" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="610" y1="140" x2="670" y2="200" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="610" y1="180" x2="670" y2="200" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="610" y1="220" x2="670" y2="200" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="610" y1="260" x2="670" y2="200" stroke="#cbd5e1" stroke-width="1.2"/>

  <!-- loss feedback -->
  <rect x="510" y="278" width="180" height="36" rx="8" fill="#fff" stroke="#1a1f26" stroke-width="1.5"/>
  <text x="600" y="300" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Loss signal ’ retrain</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#3d9a8f"/>
    </marker>
  </defs>
</svg>
