<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none" role="img" aria-label="Repeated practice builds long-term memory">
  <rect width="800" height="320" rx="16" fill="#f6f8fa"/>
  <text x="400" y="36" text-anchor="middle" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Repetition builds memory</text>
  <text x="400" y="58" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">Each retry strengthens recall  shuffle keeps you honest.</text>

  <!-- short-term stack -->
  <text x="180" y="95" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Short-term</text>
  <rect x="100" y="110" width="160" height="44" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5"/>
  <rect x="108" y="118" width="160" height="44" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" opacity="0.7"/>
  <rect x="116" y="126" width="160" height="44" rx="8" fill="#fff" stroke="#3d9a8f" stroke-width="1.7"/>
  <text x="196" y="154" text-anchor="middle" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="11">Attempt 3</text>

  <!-- arrows -->
  <path d="M290 170 L350 170" stroke="#3d9a8f" stroke-width="2.5" stroke-linecap="round" marker-end="url(#memArr)"/>
  <path d="M450 170 L510 170" stroke="#3d9a8f" stroke-width="2.5" stroke-linecap="round" marker-end="url(#memArr)"/>

  <!-- working memory -->
  <text x="400" y="95" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Practice loop</text>
  <circle cx="400" cy="170" r="48" fill="#fff" stroke="#3d9a8f" stroke-width="2"/>
  <path d="M382 170 L396 184 L420 158" stroke="#3d9a8f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="400" y="232" text-anchor="middle" fill="#3d9a8f" font-family="system-ui, sans-serif" font-size="11" font-weight="600">3-streak = mastered</text>

  <!-- long-term -->
  <text x="620" y="95" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Long-term</text>
  <path d="M560 200 C560 140 620 120 680 140 C740 160 740 220 680 240 C620 260 560 240 560 200 Z" fill="#f0fdfa" stroke="#16a34a" stroke-width="2"/>
  <path d="M600 170 C610 160 630 158 642 168" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M595 190 C608 182 628 184 638 196" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M602 210 C614 204 630 208 636 218" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
  <text x="620" y="268" text-anchor="middle" fill="#16a34a" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Pattern sticks</text>

  <!-- bottom stats -->
  <rect x="120" y="278" width="560" height="28" rx="14" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="400" y="297" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Shuffled choices · restart-on-wrong · spaced retries across the deck</text>

  <defs>
    <marker id="memArr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#3d9a8f"/>
    </marker>
  </defs>
</svg>
