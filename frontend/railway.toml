# Railway — static frontend (service root: frontend)
# Config file path in dashboard: /frontend/railway.toml
#
# Build-time variables (Dockerfile ARG):
#   VITE_API_SERVER_URL  — https://${{backend.RAILWAY_PUBLIC_DOMAIN}}
#   VITE_HOCUSPOCUS_URL  — wss://${{hocuspocus.RAILWAY_PUBLIC_DOMAIN}}

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["frontend/**"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
