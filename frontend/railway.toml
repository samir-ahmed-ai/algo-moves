# Railway config for the static frontend (no secrets — set VITE_GAMES_SERVER_URL
# in the dashboard). Arcade persistence is handled by the backend + Postgres.
# Service root directory in Railway: /frontend

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
