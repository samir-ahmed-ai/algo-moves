<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none" role="img" aria-label="Swipe mode mobile deck for algorithm drilling">
  <rect width="800" height="420" rx="16" fill="#f6f8fa"/>
  <text x="400" y="36" text-anchor="middle" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Swipe mode — built for your phone</text>
  <text x="400" y="58" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">Animate, quiz, rebuild. Full-screen drill deck.</text>

  <!-- phone frame -->
  <rect x="290" y="72" width="220" height="320" rx="28" fill="#1a1f26"/>
  <rect x="298" y="88" width="204" height="288" rx="20" fill="#0f1419"/>
  <rect x="370" y="96" width="60" height="6" rx="3" fill="#374151"/>

  <!-- card stack -->
  <rect x="318" y="118" width="164" height="200" rx="14" fill="#fff" opacity="0.15" transform="rotate(-4 400 218)"/>
  <rect x="322" y="124" width="164" height="200" rx="14" fill="#fff" opacity="0.25" transform="rotate(-2 405 224)"/>
  <rect x="326" y="130" width="164" height="200" rx="14" fill="#fff" stroke="#3d9a8f" stroke-width="2"/>

  <!-- card content -->
  <rect x="342" y="150" width="60" height="60" rx="10" fill="#f0fdfa" stroke="#3d9a8f" stroke-width="1.5"/>
  <circle cx="362" cy="170" r="6" stroke="#3d9a8f" stroke-width="1.5"/>
  <circle cx="382" cy="170" r="6" stroke="#3d9a8f" stroke-width="1.5"/>
  <line x1="352" y1="190" x2="392" y2="190" stroke="#3d9a8f" stroke-width="1.5"/>
  <rect x="412" y="158" width="62" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="412" y="174" width="48" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="412" y="188" width="56" height="6" rx="3" fill="#e5e7eb"/>

  <!-- quiz dots -->
  <circle cx="350" cy="290" r="5" fill="#3d9a8f"/>
  <circle cx="372" cy="290" r="5" fill="#e5e7eb"/>
  <circle cx="394" cy="290" r="5" fill="#e5e7eb"/>
  <rect x="342" y="306" width="132" height="10" rx="5" fill="#3d9a8f" opacity="0.25"/>

  <!-- swipe arrow -->
  <path d="M540 210 L620 210" stroke="#3d9a8f" stroke-width="3" stroke-linecap="round" marker-end="url(#swipeArr)"/>
  <path d="M600 190 L620 210 L600 230" stroke="#3d9a8f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="580" y="250" text-anchor="middle" fill="#3d9a8f" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Swipe</text>

  <!-- left labels -->
  <g transform="translate(80, 140)">
    <circle cx="8" cy="8" r="8" fill="#3d9a8f" opacity="0.2"/>
    <text x="24" y="12" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="13" font-weight="600">1. Watch the moves</text>
    <circle cx="8" cy="48" r="8" fill="#3d9a8f" opacity="0.2"/>
    <text x="24" y="52" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="13" font-weight="600">2. Answer the quiz</text>
    <circle cx="8" cy="88" r="8" fill="#3d9a8f" opacity="0.2"/>
    <text x="24" y="92" fill="#1a1f26" font-family="system-ui, sans-serif" font-size="13" font-weight="600">3. Rebuild the code</text>
    <circle cx="8" cy="128" r="8" fill="#16a34a" opacity="0.2"/>
    <text x="24" y="132" fill="#16a34a" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Wrong? Start over</text>
  </g>

  <!-- badge -->
  <rect x="318" y="348" width="164" height="28" rx="14" fill="#3d9a8f"/>
  <text x="400" y="367" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">#mobile · Add to home screen</text>

  <defs>
    <marker id="swipeArr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#3d9a8f"/>
    </marker>
  </defs>
</svg>
