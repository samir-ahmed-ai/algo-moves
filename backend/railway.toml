# Railway config for the game server. Set ALLOWED_ORIGINS and DATABASE_URL in
# the dashboard. Service root directory in Railway: /backend
# Deploys on push to main when files under backend/ change.
# Watch patterns are repo-root-relative (see Railway monorepo docs), not relative
# to this service's root directory.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
