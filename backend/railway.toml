# Railway — Go game server (service root: backend)
# Config file path in dashboard: /backend/railway.toml
#
# Variables:
#   DATABASE_URL       — ${{Postgres.DATABASE_URL}}
#   ALLOWED_ORIGINS    — https://${{frontend.RAILWAY_PUBLIC_DOMAIN}}
#                        (also enables SameSite=None; Secure session cookies)
#   RUN_MIGRATIONS     — true
#   RUN_CONTENT_SEED   — true
#
# RUN_CONTENT_SEED uses backend/internal/arcade/seeds/content_seed.sql.
# Refresh it with: npm --prefix frontend run export-content-sql

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**", "../db/migrations/**"]

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
