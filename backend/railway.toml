# Railway config for the game server. Set ALLOWED_ORIGINS and DATABASE_URL in
# the dashboard. Service root directory in Railway: /backend
# Deploys on push to main when files under backend/ change.
# Watch patterns are repo-root-relative (see Railway monorepo docs), not relative
# to this service's root directory.
#
# Required service variables (Railway dashboard → backend → Variables):
#   DATABASE_URL       — Postgres reference
#   ALLOWED_ORIGINS    — frontend public URL
#   RUN_MIGRATIONS     — true/1 to apply schema on startup; false to skip
#   RUN_CONTENT_SEED   — true/1 to reload learning catalog on startup; false to skip

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
