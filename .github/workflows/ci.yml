name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: algo-moves
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: algo-moves/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run check:all
      - run: npm run check-mobile-decks
      - run: npm run build
