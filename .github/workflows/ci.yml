name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Frontend tests
        run: npm test
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Frontend quality gates
        run: npm run check:all
      - name: Mobile deck coverage
        run: npm run check-mobile-decks
      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.mod
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
      - name: Vet backend
        run: |
          for m in . realtime shared; do (cd "$m" && go vet ./...); done
      - name: Test backend
        run: |
          for m in . realtime shared; do (cd "$m" && go test ./...); done
      - name: Build backend
        run: |
          for m in . realtime shared; do (cd "$m" && go build ./...); done
      - name: Verify sqlc generated code is up to date
        run: |
          sqlc generate
          git diff --exit-code internal/database/postgres/
