name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: algo-moves
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: algo-moves/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run check:all
      - run: npm run check-mobile-decks

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: algo-moves/package-lock.json
      - run: npm ci
        working-directory: algo-moves
      - run: npm run build -- --base /algo-moves/
        working-directory: algo-moves
      - uses: actions/upload-pages-artifact@v3
        with:
          path: algo-moves/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
