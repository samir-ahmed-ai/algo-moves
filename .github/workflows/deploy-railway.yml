name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy-railway.yml'
  workflow_dispatch:

concurrency:
  group: deploy-railway
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/deploy-railway.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy-railway.yml'

  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.mod
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run check:all
      - run: npm run check-mobile-decks

  deploy-backend:
    needs: [changes, test-backend]
    if: |
      always() &&
      needs.test-backend.result == 'success' &&
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend service
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "${{ secrets.RAILWAY_BACKEND_SERVICE_ID }}" ]; then
            echo "Skipping backend deploy: set RAILWAY_TOKEN and RAILWAY_BACKEND_SERVICE_ID repo secrets."
            exit 0
          fi
          railway up backend --path-as-root --ci --service="${{ secrets.RAILWAY_BACKEND_SERVICE_ID }}"

  deploy-frontend:
    needs: [changes, test-frontend]
    if: |
      always() &&
      needs.test-frontend.result == 'success' &&
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy frontend service
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "${{ secrets.RAILWAY_FRONTEND_SERVICE_ID }}" ]; then
            echo "Skipping frontend deploy: set RAILWAY_TOKEN and RAILWAY_FRONTEND_SERVICE_ID repo secrets."
            exit 0
          fi
          railway up frontend --path-as-root --ci --service="${{ secrets.RAILWAY_FRONTEND_SERVICE_ID }}"
